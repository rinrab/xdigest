name: Test cmake

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - run: sudo apt-get install gcc-multilib lib32stdc++6

    - run: cmake -B x64 -DCMAKE_INSTALL_PREFIX=install/x64
    - run: ninja -C x64
    - run: ninja -C x64 install
    - run: ninja -C x64 test
