name: Build

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  linux-x86-64:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - run: |
        sudo apt-get install gcc-multilib 

    - run: make rebuild install test PREFIX=install64 ARCH=x86_64
    - run: make rebuild install test PREFIX=install64 ARCH=x86_64 NO_ASM=1

    - run: make rebuild install test PREFIX=install32 ARCH=x86
    - run: make rebuild install test PREFIX=install32 ARCH=x86 NO_ASM=1 

  linux-cross-compile-arm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - run: |
        sudo apt-get install gcc-aarch64-linux-gnu

    - run: make rebuild install PREFIX=installaarch64 ARCH=aarch64
    - run: make rebuild install PREFIX=installaarch64 ARCH=aarch64 NO_ASM=1

  linux-arm:
    runs-on: ubuntu-latest-arm 
    steps:
    - uses: actions/checkout@v6

    - run: make rebuild install test PREFIX=installaarch64 ARCH=aarch64
    - run: make rebuild install test PREFIX=installaarch64 ARCH=aarch64 NO_ASM=1

  win32:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
    - uses: johnnynunez/vsdevenv-shell@v2

    - name: Prepare Environment

    - name: Run x64
      shell: vsdevenv x64 pwsh {0}
      run: nmake /F Makefile.win
